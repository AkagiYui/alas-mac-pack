# StarRailCopilot deploy config for the macOS (Apple Silicon) package.
#
# Written into  <App>.app/Contents/Resources/payload/app/config/deploy.yaml
# by scripts/20-assemble.sh.
#
# Executables use paths RELATIVE to the repo root (payload/app), so they stay
# valid wherever the user drags the .app:
#   payload/app              <- repo root (this file: payload/app/config/)
#   payload/python/bin/python3   <- ../python/bin/python3  (python-build-standalone + pip)
#   payload/platform-tools/adb   <- ../platform-tools/adb
Deploy:
  Git:
    Repository: global
    Branch: master
    # No git bundled; the deploy module falls back to the system git (Xcode CLT).
    GitExecutable: git
    GitProxy: null
    SSLVerify: true
    AutoUpdate: true
    KeepLocalChanges: false
  Python:
    PythonExecutable: ../python/bin/python3
    PypiMirror: null
    # Deps are already pip-installed into the bundled python; don't reinstall at
    # startup. Updates that add deps can be installed from the webui.
    InstallDependencies: false
    RequirementsFile: requirements.txt
  Adb:
    AdbExecutable: ../platform-tools/adb
    ReplaceAdb: false
    AutoConnect: true
    InstallUiautomator2: true
  Ocr:
    UseOcrServer: false
    StartOcrServer: false
    OcrServerPort: 22268
    OcrClientAddress: 127.0.0.1:22268
  Update:
    EnableReload: true
    CheckUpdateInterval: 5
    AutoRestartTime: 03:50
  Misc:
    DiscordRichPresence: false
  RemoteAccess:
    EnableRemoteAccess: false
    SSHUser: null
    SSHServer: null
    SSHExecutable: ssh
  Webui:
    WebuiHost: 127.0.0.1
    WebuiPort: 22367
    Language: en-US
    Theme: default
    DpiScaling: true
    Password: null
    CDN: false
    Run: null
    AppAsarUpdate: false
    NoSandbox: false
