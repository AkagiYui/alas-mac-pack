name: build-macos-alas

# Builds the AzurLaneAutoScript macOS (Apple Silicon) Electron package and
# uploads the .dmg as a workflow artifact.
#
# Nothing heavy is stored in the repo: the conda python env is created at build
# time from config/environment-alas.yml, the Alas repo is cloned at its LATEST
# RELEASE commit, and adb is downloaded from Google. Everything is packaged into
# the .app.
#
# Runs on macos-15 so the end-to-end smoke test validates on the same OS users
# have (macOS 15 / Sequoia) — a broken artifact fails the build instead of shipping.

on:
  workflow_dispatch:
  push:
    tags:
      - 'alas-v*'

permissions:
  contents: read

concurrency:
  group: build-alas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15           # Apple Silicon (arm64), macOS 15 = users' OS
    env:
      PROFILE: alas
      GH_TOKEN: ${{ github.token }}   # for `gh release view` (resolve release tag)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Install build tools
        run: brew install create-dmg librsvg   # librsvg -> rsvg-convert for icon generation

      - name: Create conda env (alas)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: alas
          environment-file: config/environment-alas.yml
          auto-activate-base: false

      - name: Build payload (clone repo + copy conda env + adb)
        shell: bash -el {0}     # login shell so `conda` is initialised
        run: bash scripts/05-alas-build-payload.sh

      - name: Build Electron shell
        run: |
          bash scripts/00-prepare-webapp.sh
          bash scripts/06-make-icons.sh
          bash scripts/10-build-shell.sh

      - name: Assemble payload into .app
        run: bash scripts/20-assemble.sh

      - name: Package (ad-hoc sign + dmg)
        run: bash scripts/30-package.sh

      - name: Headless smoke test (python + webui)
        run: bash scripts/40-smoke-test.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AzurLaneAutoScript-mac-arm64-${{ env.UPSTREAM_COMMIT }}
          path: dist/*.dmg
          if-no-files-found: error
          compression-level: 0    # dmg is already compressed
          retention-days: 14
