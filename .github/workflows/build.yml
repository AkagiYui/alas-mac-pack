name: build-macos

# Builds the AzurLaneAutoScript macOS (Apple Silicon) Electron package and
# uploads the .dmg as a workflow artifact.
#
# Nothing heavy is stored in the repo: the conda python env is created at build
# time from config/environment.yml, the Alas repo is cloned, and adb is
# downloaded from Google. Everything is packaged into the .app.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14           # Apple Silicon (arm64)
    defaults:
      run:
        shell: bash -el {0}     # login shell so `conda` is on PATH
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create conda env (alas)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: alas
          environment-file: config/environment.yml
          auto-activate-base: false

      - name: Build payload (clone repo + copy conda env + adb)
        run: bash scripts/05-build-payload.sh

      - name: Build Electron shell
        run: |
          bash scripts/00-prepare-webapp.sh
          bash scripts/10-build-shell.sh

      - name: Assemble payload into .app
        run: bash scripts/20-assemble.sh

      - name: Package (ad-hoc sign + dmg)
        run: bash scripts/30-package.sh

      - name: Headless smoke test (python + webui)
        run: bash scripts/40-smoke-test.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AzurLaneAutoScript-mac-arm64-dmg
          path: dist/*.dmg
          if-no-files-found: error
          compression-level: 0    # dmg is already compressed
          retention-days: 14
